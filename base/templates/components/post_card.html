<article
    class="overflow-hidden rounded-xl h-[200px] border border-gray-200 bg-white p-6 shadow-sm transition hover:-translate-y-1 hover:shadow-lg"
>

    <div class="mb-3 text-sm text-gray-500">
        {{ post.first_published_at|date:"Y-m-d" }}
    </div>

    <h3 class="mb-3 text-xl font-bold text-gray-900">
        <a href="{{ post.url }}" class="hover:text-blue-600">
            {{ post.title }}
        </a>
    </h3>

    {% if post.summary %}
        <p class="line-clamp-3 text-gray-600">
            {{ post.summary }}
        </p>
    {% endif %}

</article>
